name: cbl_launcher
repository: https://github.com/blaugold/cli_launcher

packages:
  - .

ide:
  intellij: false

command:
  version:
    branch: main
    linkToCommits: true
  bootstrap:
    usePubspecOverrides: true

scripts:
  format:
    exec: daco format .

  format:check:
    exec: daco format --set-exit-if-changed .

  analyze:
    run: dart analyze --fatal-infos
    exec:
      concurrency: 1

  test:
    exec: dart test -j 1
    selectPackage:
      dirExists: test
