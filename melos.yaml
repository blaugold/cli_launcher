name: cbl_launcher
repository: https://github.com/blaugold/cli_launcher

packages:
  - .

ide:
  intellij: false

command:
  version:
    branch: main
    linkToCommits: true
  bootstrap:
    usePubspecOverrides: true

scripts:
  activate_example_cli:
    run: cd fixture_packages/example_v1 && dart pub global activate --source path .

  activate_workspace_example_cli:
    run: cd fixture_packages/example_workspace && dart pub global activate --source path packages/example_workspace

  activate_flutter_workspace_example_cli:
    run: cd fixture_packages/flutter_workspace && flutter pub get && dart pub global activate --source path packages/example_flutter_workspace

  install_example_cli:
    run: dart install fixture_packages/example_v1

  format:
    exec: daco format .

  format:check:
    exec: daco format --set-exit-if-changed .

  analyze:
    run: dart analyze --fatal-infos
    exec:
      concurrency: 1

  test:
    exec: dart test -j 1
    selectPackage:
      dirExists: test
