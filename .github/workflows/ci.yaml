name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 0 * * *'

jobs:
  ci:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        dart: [stable, dev]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.dart == 'dev' && 'master' || matrix.dart }}
          cache: true
      - run: dart pub global activate melos
      - run: dart pub global activate daco
      - run: melos bootstrap
      - run: melos format:check
      - run: melos analyze
      - run: melos test
